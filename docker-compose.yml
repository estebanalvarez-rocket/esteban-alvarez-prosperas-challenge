services:
  postgres:
    image: postgres:16-alpine
    container_name: reports-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: reports
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./local/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reports"]
      interval: 5s
      timeout: 3s
      retries: 20

  localstack:
    image: localstack/localstack:3.8
    container_name: reports-localstack
    restart: unless-stopped
    environment:
      SERVICES: sqs,s3,cloudwatch
      DEBUG: 1
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    volumes:
      - ./local/aws/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh:ro
      - localstack_data:/var/lib/localstack
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "awslocal sqs list-queues >/dev/null && awslocal s3api list-buckets >/dev/null && awslocal cloudwatch list-metrics >/dev/null",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
    container_name: reports-api
    restart: unless-stopped
    env_file:
      - ./.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/reports
      AWS_ENDPOINT_URL: http://localstack:4566
      S3_RESULT_BASE_URL: http://localhost:4566/reports-results
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    container_name: reports-worker
    restart: unless-stopped
    command: python -m app.worker.runner
    env_file:
      - ./.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/reports
      AWS_ENDPOINT_URL: http://localstack:4566
      S3_RESULT_BASE_URL: http://localhost:4566/reports-results
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: reports-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  localstack_data:
