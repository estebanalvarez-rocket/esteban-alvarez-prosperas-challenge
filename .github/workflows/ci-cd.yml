name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docker-compose.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TERRAFORM_WORKING_DIR: ./infra
  BACKEND_WORKING_DIR: ./backend
  FRONTEND_WORKING_DIR: ./frontend

jobs:
  # --- Continuous Integration (CI) ---
  ci-backend:
    name: "Backend CI (Python)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        working-directory: ${{ env.BACKEND_WORKING_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff
        working-directory: ${{ env.BACKEND_WORKING_DIR }}
        run: ruff check .

      - name: Run Tests
        working-directory: ${{ env.BACKEND_WORKING_DIR }}
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/reports
          SQS_QUEUE_URL: http://localhost:4566/000000000000/reports-jobs
          SQS_DLQ_URL: http://localhost:4566/000000000000/reports-jobs-dlq
          S3_REPORTS_BUCKET: reports-results
          JWT_SECRET_KEY: test-secret
        run: pytest

  ci-frontend:
    name: "Frontend CI (React)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_WORKING_DIR }}
        run: npm ci

      - name: Lint
        working-directory: ${{ env.FRONTEND_WORKING_DIR }}
        run: npm run lint

      - name: Build
        working-directory: ${{ env.FRONTEND_WORKING_DIR }}
        run: npm run build

  ci-infrastructure:
    name: "Infrastructure CI (Terraform)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init & Validate
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID || 'mock' }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY || 'mock' }}
        run: |
          # Solo plan para visualizar cambios en PRs si hay credenciales
          if [ "${{ secrets.AWS_ACCESS_KEY_ID }}" != "" ]; then
            terraform plan -no-color
          else
            echo "Skipping plan: No AWS credentials provided"
          fi

  # --- Continuous Delivery (CD) ---
  deploy:
    name: "Deploy to Production"
    runs-on: ubuntu-latest
    needs: [ci-backend, ci-frontend, ci-infrastructure]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Backend Images
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          API_ECR_REPOSITORY: ${{ secrets.API_ECR_REPOSITORY }}
          WORKER_ECR_REPOSITORY: ${{ secrets.WORKER_ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build API
          docker build -t $ECR_REGISTRY/$API_ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$API_ECR_REPOSITORY:latest ./backend
          docker push $ECR_REGISTRY/$API_ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$API_ECR_REPOSITORY:latest
          
          # Build Worker
          docker build -t $ECR_REGISTRY/$WORKER_ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$WORKER_ECR_REPOSITORY:latest ./backend
          docker push $ECR_REGISTRY/$WORKER_ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$WORKER_ECR_REPOSITORY:latest

      - name: Build & Sync Frontend
        working-directory: ${{ env.FRONTEND_WORKING_DIR }}
        env:
          VITE_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
          FRONTEND_BUCKET_NAME: ${{ secrets.FRONTEND_BUCKET_NAME }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          npm ci
          npm run build
          aws s3 sync dist s3://$FRONTEND_BUCKET_NAME --delete
          aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/*"

      - name: Update ECS Services
        env:
          ECS_CLUSTER_NAME: ${{ secrets.ECS_CLUSTER_NAME }}
          ECS_API_SERVICE_NAME: ${{ secrets.ECS_API_SERVICE_NAME }}
          ECS_WORKER_SERVICE_NAME: ${{ secrets.ECS_WORKER_SERVICE_NAME }}
        run: |
          aws ecs update-service --cluster $ECS_CLUSTER_NAME --service $ECS_API_SERVICE_NAME --force-new-deployment
          aws ecs update-service --cluster $ECS_CLUSTER_NAME --service $ECS_WORKER_SERVICE_NAME --force-new-deployment

      - name: Log Deployment Success
        run: echo "Successfully deployed version ${{ github.sha }} to production"
